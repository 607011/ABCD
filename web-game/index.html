<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>ABCD</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script async src="mt.js"></script>
        <script async src="app.js"></script>
        <link rel="stylesheet" href="default.css">
    </head>
    <body>
        <main>
            <abcd-game seed="1" fading-duration-ms="100" width="7" height="9"></abcd-game>
            <div id="stats">
                <span id="move-count">0 moves</span>
            </div>
            <div id="controls">
                <label for="seed">Game #</label>
                <input type="number" min="1" name="seed" id="seed" value="1"/>
                <span id="restart" title="restart">↩︎</span>
            </div>
        </main>
    </body>
</html>
